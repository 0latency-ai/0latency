<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <defs>
    <linearGradient id="zero-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="zero-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wm-text { font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif; font-weight: 600; font-size: 32px; fill: white; letter-spacing: -0.5px; }
    </style>
  </defs>
  
  <!-- Stylized "0" with glow ring -->
  <text x="12" y="36" class="wm-text" fill="url(#zero-grad)" font-weight="700" filter="url(#zero-glow)">0</text>
  
  <!-- "Latency" -->
  <text x="32" y="36" class="wm-text">Latency</text>
</svg>