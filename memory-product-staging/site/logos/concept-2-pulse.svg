<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 2: Rounded Zero with a memory pulse/signal through the center -->
  <rect width="512" height="512" fill="transparent"/>
  
  <!-- Outer rounded "0" -->
  <ellipse cx="256" cy="256" rx="200" ry="220" fill="none" stroke="#f97316" stroke-width="32"/>
  
  <!-- Inner cutout ellipse -->
  <ellipse cx="256" cy="256" rx="100" ry="120" fill="none" stroke="#f97316" stroke-width="24"/>
  
  <!-- Memory pulse line cutting horizontally through the zero -->
  <!-- Flatline → spike → flatline pattern like a heartbeat/signal -->
  <polyline points="16,256 120,256 152,256 176,180 200,332 224,200 248,312 272,256 360,256 496,256" 
            fill="none" stroke="#34d399" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>