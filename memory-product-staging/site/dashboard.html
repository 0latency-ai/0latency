<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="/logos/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/logos/0latency-icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/logos/0latency-icon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/logos/0latency-icon-256.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Latency Memory — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #111827; min-height: 100vh; }
  .container { max-width: 1060px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #111827; }
  h2 { font-size: 16px; margin-bottom: 12px; color: #ccc; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
  .row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  input, select { padding: 10px 14px; background: #ffffff; border: 1px solid #d1d5db; border-radius: 6px; color: #111827; font-family: monospace; font-size: 14px; }
  input:focus, select:focus { border-color: #2563eb; outline: none; }
  .flex1 { flex: 1; min-width: 200px; }
  button { padding: 10px 20px; background: #2563eb; color: #111827; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; }
  button:hover { background: #1d4ed8; }
  button.secondary { background: #d1d5db; }
  button.secondary:hover { background: #444; }
  button.danger { background: #dc2626; }
  button.danger:hover { background: #b91c1c; }
  button.sm { padding: 4px 10px; font-size: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
  .card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card .value { font-size: 28px; font-weight: 600; color: #111827; }
  .card .detail { font-size: 12px; color: #666; margin-top: 4px; }
  .section { margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; font-size: 12px; color: #888; text-transform: uppercase; border-bottom: 1px solid #222; }
  td { padding: 8px 12px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  tr:hover td { background: #f8fafc; }
  .status-ok { color: #22c55e; }
  .status-warn { color: #eab308; }
  .status-error { color: #ef4444; }
  .bar { background: #e5e7eb; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 8px; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .bar-fill.green { background: #22c55e; }
  .bar-fill.yellow { background: #eab308; }
  .bar-fill.red { background: #ef4444; }
  .hidden { display: none; }
  .error-msg { color: #ef4444; padding: 12px; background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 6px; margin-bottom: 16px; }
  .mono { font-family: monospace; font-size: 12px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .tag-fact { background: #1e3a5f; color: #2563eb; }
  .tag-preference { background: #3b1f5c; color: #9333ea; }
  .tag-decision { background: #1f3b1f; color: #16a34a; }
  .tag-correction { background: #5c3b1f; color: #d97706; }
  .tag-identity { background: #5c1f3b; color: #db2777; }
  .tag-task { background: #1f4f4f; color: #5eead4; }
  .tag-relationship { background: #3b3b1f; color: #fde047; }
  .truncate { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; color: #111827; font-size: 14px; z-index: 100; transition: opacity 0.3s; }
  .toast-ok { background: #16a34a; }
  .toast-err { background: #dc2626; }
  #dashboard { opacity: 0; transition: opacity 0.3s; }
  #dashboard.loaded { opacity: 1; }
</style>
</head>
<body>
<div style="padding: 20px; border-bottom: 1px solid var(--border, #e5e7eb); background: var(--surface, #ffffff);">
    <img src="/logos/logo-icon.svg" alt="0" style="height:28px;vertical-align:middle;"><span style="font-weight:700;font-size:1.1rem;margin-left:6px;"><span style="color:#f97316;">0</span><span style="color:#111827;">Latency</span></span></span>Latency</span> <span style="font-weight:700;font-size:1.2rem;"><span style="color:#f97316;">0</span>Latency</span>
</div>

<div class="container">
  <h1>⚡ Zero Latency Memory</h1>
  <p class="subtitle">Tenant Dashboard v2</p>
  
  <div class="row">
    <input type="password" id="apiKey" placeholder="Paste your API key (zl_live_...)" class="flex1" />
    <button onclick="loadDashboard()">Connect</button>
  </div>
  
  <div id="error" class="error-msg hidden"></div>
  
  <div id="dashboard" class="hidden">
    <!-- Stats -->
    <div class="grid">
      <div class="card">
        <div class="label">Memories</div>
        <div class="value" id="memCount">—</div>
        <div class="bar"><div class="bar-fill green" id="memBar" style="width:0%"></div></div>
        <div class="detail" id="memDetail"></div>
      </div>
      <div class="card">
        <div class="label">API Calls</div>
        <div class="value" id="apiCalls">—</div>
      </div>
      <div class="card">
        <div class="label">Plan</div>
        <div class="value" id="plan">—</div>
        <div class="detail" id="rateLimit"></div>
      </div>
      <div class="card">
        <div class="label">Status</div>
        <div class="value status-ok" id="status">—</div>
      </div>
    </div>
    
    <!-- Usage -->
    <div class="section">
      <h2>Usage (Last 7 Days)</h2>
      <table>
        <thead><tr><th>Endpoint</th><th>Calls</th><th>Tokens</th><th>Avg Latency</th><th>Errors</th></tr></thead>
        <tbody id="usageTable"></tbody>
      </table>
    </div>
    
    <!-- Memory Browser -->
    <div class="section">
      <h2>Memory Browser</h2>
      <div class="row">
        <input id="agentId" placeholder="Agent ID" value="thomas" class="flex1" />
        <input id="searchQuery" placeholder="Search memories..." class="flex1" />
        <select id="typeFilter">
          <option value="">All types</option>
          <option value="fact">fact</option>
          <option value="preference">preference</option>
          <option value="decision">decision</option>
          <option value="correction">correction</option>
          <option value="identity">identity</option>
          <option value="task">task</option>
          <option value="relationship">relationship</option>
        </select>
        <button onclick="loadMemories()">Load</button>
        <button class="secondary" onclick="searchMemories()">Search</button>
      </div>
      <table>
        <thead><tr><th>Headline</th><th>Type</th><th>Importance</th><th>Created</th><th></th></tr></thead>
        <tbody id="memoriesTable"></tbody>
      </table>
      <div style="margin-top:8px;color:#666;font-size:12px" id="memoryCount"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const BASE = window.location.origin;
let KEY = '';

async function api(method, path, body) {
  const opts = { method, headers: { 'X-API-Key': KEY } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(`${BASE}${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${ok ? 'toast-ok' : 'toast-err'}`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

function tagClass(type) {
  const map = {fact:'tag-fact',preference:'tag-preference',decision:'tag-decision',correction:'tag-correction',identity:'tag-identity',task:'tag-task',relationship:'tag-relationship'};
  return map[type] || 'tag-fact';
}

async function loadDashboard() {
  KEY = document.getElementById('apiKey').value.trim();
  const errEl = document.getElementById('error');
  const dashEl = document.getElementById('dashboard');
  errEl.classList.add('hidden');
  
  try {
    const info = await api('GET', '/tenant-info');
    document.getElementById('plan').textContent = info.plan.charAt(0).toUpperCase() + info.plan.slice(1);
    document.getElementById('apiCalls').textContent = info.api_calls_count.toLocaleString();
    document.getElementById('rateLimit').textContent = `${info.rate_limit_rpm} req/min`;
    document.getElementById('status').textContent = 'Active';
    
    const usage = await api('GET', '/usage?days=7');
    document.getElementById('memCount').textContent = usage.memories_stored.toLocaleString();
    const pct = usage.memory_usage_pct;
    document.getElementById('memDetail').textContent = `${pct}% of ${usage.memory_limit.toLocaleString()} limit`;
    const bar = document.getElementById('memBar');
    bar.style.width = Math.min(pct, 100) + '%';
    bar.className = 'bar-fill ' + (pct > 90 ? 'red' : pct > 70 ? 'yellow' : 'green');
    
    const tbody = document.getElementById('usageTable');
    tbody.innerHTML = '';
    for (const ep of usage.endpoints) {
      tbody.innerHTML += `<tr><td class="mono">${ep.endpoint}</td><td>${ep.calls}</td><td>${ep.total_tokens.toLocaleString()}</td><td>${ep.avg_latency_ms}ms</td><td class="${ep.errors>0?'status-error':''}">${ep.errors}</td></tr>`;
    }
    if (!usage.endpoints.length) tbody.innerHTML = '<tr><td colspan="5" style="color:#666">No calls yet</td></tr>';
    
    dashEl.classList.remove('hidden');
    dashEl.classList.add('loaded');
    loadMemories();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
    dashEl.classList.add('hidden');
  }
}

async function loadMemories() {
  const agent = document.getElementById('agentId').value.trim() || 'thomas';
  const type = document.getElementById('typeFilter').value;
  let url = `/memories?agent_id=${encodeURIComponent(agent)}&limit=50`;
  if (type) url += `&memory_type=${type}`;
  
  try {
    const memories = await api('GET', url);
    renderMemories(memories);
  } catch (e) { toast(e.message, false); }
}

async function searchMemories() {
  const agent = document.getElementById('agentId').value.trim() || 'thomas';
  const q = document.getElementById('searchQuery').value.trim();
  if (!q) { loadMemories(); return; }
  
  try {
    const results = await api('GET', `/memories/search?agent_id=${encodeURIComponent(agent)}&q=${encodeURIComponent(q)}&limit=50`);
    renderMemories(results);
  } catch (e) { toast(e.message, false); }
}

function renderMemories(memories) {
  const tbody = document.getElementById('memoriesTable');
  tbody.innerHTML = '';
  for (const m of memories) {
    const date = new Date(m.created_at).toLocaleDateString();
    tbody.innerHTML += `<tr>
      <td class="truncate" title="${(m.context||m.headline||'').replace(/"/g,'&quot;')}">${m.headline}</td>
      <td><span class="tag ${tagClass(m.memory_type)}">${m.memory_type}</span></td>
      <td>${m.importance}</td>
      <td class="mono">${date}</td>
      <td><button class="sm danger" onclick="deleteMem('${m.id}','${m.headline.replace(/'/g,"\\'")}')">×</button></td>
    </tr>`;
  }
  if (!memories.length) tbody.innerHTML = '<tr><td colspan="5" style="color:#666">No memories found</td></tr>';
  document.getElementById('memoryCount').textContent = `${memories.length} memories shown`;
}

async function deleteMem(id, headline) {
  if (!confirm(`Delete memory?\n\n"${headline}"`)) return;
  try {
    await api('DELETE', `/memories/${id}`);
    toast('Memory deleted');
    loadMemories();
  } catch (e) { toast(e.message, false); }
}

document.getElementById('searchQuery').addEventListener('keydown', e => { if (e.key === 'Enter') searchMemories(); });
document.getElementById('agentId').addEventListener('keydown', e => { if (e.key === 'Enter') loadMemories(); });

if (window.location.hash) {
  document.getElementById('apiKey').value = window.location.hash.slice(1);
  loadDashboard();
}
</script>
</body>
</html>
