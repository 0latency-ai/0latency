<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0Latency Memory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e2e;
    }
    .logo { font-weight: 700; font-size: 15px; }
    .logo span { color: #818cf8; }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #71717a;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status-dot.ok { background: #34d399; }
    
    .section { padding: 14px 16px; border-bottom: 1px solid #1e1e2e; }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #71717a;
      margin-bottom: 10px;
    }
    
    .config-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .config-row label {
      width: 70px;
      font-size: 12px;
      color: #a1a1aa;
    }
    .config-row input {
      flex: 1;
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e4e4e7;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .config-row input:focus {
      outline: none;
      border-color: #818cf8;
    }
    
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .toggle-label { font-size: 12px; color: #a1a1aa; }
    .toggle {
      width: 36px; height: 20px;
      background: #27272a;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on { background: #818cf8; }
    .toggle::after {
      content: '';
      width: 16px; height: 16px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(16px); }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: #818cf8;
    }
    .stat-label {
      font-size: 10px;
      color: #71717a;
      margin-top: 2px;
    }
    
    .platforms {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .platform-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #12121a;
      border: 1px solid #1e1e2e;
      color: #a1a1aa;
    }
    .platform-badge.active {
      border-color: #818cf8;
      color: #818cf8;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary {
      background: #818cf8;
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      color: #a1a1aa;
      border: 1px solid #1e1e2e;
    }
    
    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #52525b;
    }
    .footer a { color: #818cf8; text-decoration: none; }
    
    .msg {
      padding: 6px 10px;
      margin-top: 8px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    .msg.success { display: block; background: rgba(52, 211, 153, 0.1); color: #34d399; }
    .msg.error { display: block; background: rgba(239, 68, 68, 0.1); color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><span>0</span>Latency</div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>
    <div class="config-row">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="zl_live_..." />
    </div>
    <div class="config-row">
      <label>Agent ID</label>
      <input type="text" id="agentId" placeholder="chrome-extension" />
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Auto-capture conversations</span>
      <div class="toggle on" id="autoCapture"></div>
    </div>
    <button class="btn btn-primary" id="saveBtn">Save</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="section">
    <div class="section-title">Stats</div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="capturedCount">0</div>
        <div class="stat-label">Memories Captured</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="platformCount">4</div>
        <div class="stat-label">Platforms</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Supported Platforms</div>
    <div class="platforms">
      <span class="platform-badge active">ChatGPT</span>
      <span class="platform-badge active">Claude</span>
      <span class="platform-badge active">Gemini</span>
      <span class="platform-badge active">Perplexity</span>
    </div>
  </div>

  <div class="section">
    <button class="btn btn-secondary" id="dashboardBtn">Open Dashboard ↗</button>
  </div>

  <div class="footer">
    <a href="https://0latency.ai">0latency.ai</a> · v0.1.0
  </div>

  <script>
    const $ = id => document.getElementById(id);

    // Load config
    chrome.storage.sync.get({
      apiKey: '',
      agentId: 'chrome-extension',
      autoCapture: true,
      capturedCount: 0,
    }, config => {
      $('apiKey').value = config.apiKey;
      $('agentId').value = config.agentId;
      $('capturedCount').textContent = config.capturedCount || 0;
      
      const toggle = $('autoCapture');
      if (!config.autoCapture) toggle.classList.remove('on');
    });

    // Check status
    chrome.runtime.sendMessage({ type: 'GET_STATUS' }, status => {
      if (status) {
        const dot = $('statusDot');
        const text = $('statusText');
        if (status.configured && status.apiStatus === 'ok') {
          dot.classList.add('ok');
          text.textContent = 'Connected';
        } else if (status.configured) {
          text.textContent = 'API ' + status.apiStatus;
        } else {
          text.textContent = 'Not configured';
        }
      }
    });

    // Toggle
    $('autoCapture').addEventListener('click', function() {
      this.classList.toggle('on');
    });

    // Save
    $('saveBtn').addEventListener('click', () => {
      const apiKey = $('apiKey').value.trim();
      const agentId = $('agentId').value.trim() || 'chrome-extension';
      const autoCapture = $('autoCapture').classList.contains('on');

      if (apiKey && !apiKey.startsWith('zl_live_')) {
        showMsg('API key must start with zl_live_', 'error');
        return;
      }

      chrome.storage.sync.set({ apiKey, agentId, autoCapture }, () => {
        showMsg('Saved!', 'success');
        // Re-check status
        setTimeout(() => {
          chrome.runtime.sendMessage({ type: 'GET_STATUS' }, status => {
            const dot = $('statusDot');
            const text = $('statusText');
            if (status?.apiStatus === 'ok') {
              dot.classList.add('ok');
              text.textContent = 'Connected';
            }
          });
        }, 500);
      });
    });

    // Dashboard
    $('dashboardBtn').addEventListener('click', () => {
      chrome.tabs.create({ url: 'https://0latency.ai/dashboard' });
    });

    function showMsg(text, type) {
      const el = $('msg');
      el.textContent = text;
      el.className = `msg ${type}`;
      setTimeout(() => { el.className = 'msg'; }, 3000);
    }
  </script>
</body>
</html>
