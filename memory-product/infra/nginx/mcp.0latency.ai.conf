# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name mcp.0latency.ai;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name mcp.0latency.ai;

    ssl_certificate /etc/letsencrypt/live/mcp.0latency.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.0latency.ai/privkey.pem;

    location /.well-known/mcp/ {
        alias /var/www/0latency/.well-known/mcp/;
        default_type application/json;
    }


    # Audit events endpoint - proxy to memory API backend
    location /audit/events {
        proxy_pass http://127.0.0.1:8420/audit/events;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    location / {
        proxy_pass http://localhost:3100;
        proxy_http_version 1.1;
        
        # Critical SSE settings
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        # SSE headers
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering no;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for long-lived SSE connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
