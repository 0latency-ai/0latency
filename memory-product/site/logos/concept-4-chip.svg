<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 4: Zero as a chip/processor — square-rounded with pin traces -->
  <rect width="512" height="512" fill="transparent"/>
  
  <!-- Main chip body — rounded square "0" -->
  <rect x="96" y="64" width="320" height="384" rx="48" ry="48" 
        fill="none" stroke="#f97316" stroke-width="28"/>
  
  <!-- Inner cutout — makes it a "0" -->
  <rect x="192" y="176" width="128" height="160" rx="24" ry="24" 
        fill="none" stroke="#f97316" stroke-width="20"/>
  
  <!-- Pin traces — left side -->
  <line x1="96" y1="160" x2="40" y2="160" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="96" y1="224" x2="40" y2="224" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="96" y1="288" x2="40" y2="288" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="96" y1="352" x2="40" y2="352" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Pin traces — right side -->
  <line x1="416" y1="160" x2="472" y2="160" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="416" y1="224" x2="472" y2="224" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="416" y1="288" x2="472" y2="288" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="416" y1="352" x2="472" y2="352" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Pin traces — top -->
  <line x1="192" y1="64" x2="192" y2="16" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="64" x2="256" y2="16" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="320" y1="64" x2="320" y2="16" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Pin traces — bottom -->
  <line x1="192" y1="448" x2="192" y2="496" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="448" x2="256" y2="496" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <line x1="320" y1="448" x2="320" y2="496" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Green accent nodes at pin endpoints -->
  <circle cx="40" cy="160" r="8" fill="#34d399"/>
  <circle cx="40" cy="288" r="8" fill="#34d399"/>
  <circle cx="472" cy="224" r="8" fill="#34d399"/>
  <circle cx="472" cy="352" r="8" fill="#34d399"/>
  <circle cx="256" cy="16" r="8" fill="#34d399"/>
  <circle cx="256" cy="496" r="8" fill="#34d399"/>
</svg>