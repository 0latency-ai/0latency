<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 3: Ultra-minimal — bold zero, single accent dot (favicon-friendly) -->
  <rect width="512" height="512" fill="transparent"/>
  
  <!-- Bold outer zero -->
  <ellipse cx="256" cy="256" rx="188" ry="212" fill="none" stroke="#f97316" stroke-width="48"/>
  
  <!-- Inner cutout -->
  <ellipse cx="256" cy="256" rx="88" ry="112" fill="none" stroke="#f97316" stroke-width="36"/>
  
  <!-- Single accent node — top right, like a power indicator -->
  <circle cx="388" cy="108" r="24" fill="#34d399"/>
</svg>