<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="accent-grad-full" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <style>
      .wordmark { font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif; font-weight: 600; font-size: 28px; fill: white; letter-spacing: -0.5px; }
    </style>
  </defs>
  
  <!-- Icon (scaled to fit 64x64 area) -->
  <g>
    <!-- Zero ring -->
    <ellipse cx="32" cy="32" rx="14" ry="18" fill="none" stroke="url(#accent-grad-full)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Inner data point -->
    <circle cx="32" cy="32" r="2.5" fill="#34d399"/>
    <!-- Circuit traces -->
    <line x1="32" y1="14" x2="32" y2="6" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="32" cy="5" r="1.5" fill="#f97316"/>
    <line x1="32" y1="50" x2="32" y2="58" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="32" cy="59" r="1.5" fill="#f97316"/>
    <line x1="18" y1="32" x2="10" y2="32" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="9" cy="32" r="1.5" fill="#f97316"/>
    <line x1="46" y1="32" x2="54" y2="32" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="1.5" fill="#f97316"/>
    <!-- Diagonals -->
    <line x1="42" y1="18" x2="49" y2="11" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <circle cx="50" cy="10" r="1.2" fill="#f97316" opacity="0.6"/>
    <line x1="22" y1="18" x2="15" y2="11" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <circle cx="14" cy="10" r="1.2" fill="#f97316" opacity="0.6"/>
    <line x1="42" y1="46" x2="49" y2="53" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <circle cx="50" cy="54" r="1.2" fill="#f97316" opacity="0.6"/>
    <line x1="22" y1="46" x2="15" y2="53" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <circle cx="14" cy="54" r="1.2" fill="#f97316" opacity="0.6"/>
  </g>
  
  <!-- Wordmark -->
  <g>
    <!-- "0" in accent color matching icon -->
    <text x="72" y="42" class="wordmark" fill="#f97316" font-weight="700">0</text>
    <!-- "Latency" in white -->
    <text x="89" y="42" class="wordmark">Latency</text>
  </g>
</svg>