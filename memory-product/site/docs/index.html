<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation | 0Latency</title>
    <link rel="icon" type="image/png" href="/logos/0latency-icon-32.png">
    
    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --border: #334155;
            --code-bg: #1e293b;
            --link: #60a5fa;
            --link-hover: #93c5fd;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            background: #0a0f1e;
        }
        
        header a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            max-width: 1400px;
            margin: 0 auto;
            gap: 2rem;
            padding: 2rem;
        }
        
        nav {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }
        
        nav h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        nav ul {
            list-style: none;
            margin-bottom: 1.5rem;
        }
        
        nav a {
            display: block;
            padding: 0.4rem 0;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        
        nav a:hover, nav a.active {
            color: var(--link);
        }
        
        main {
            max-width: 800px;
            background: #1a2332;
            border-radius: 8px;
            padding: 2.5rem;
            border: 1px solid var(--border);
        }
        
        #content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        
        #content h2 {
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #fff;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        
        #content h3 {
            font-size: 1.3rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #fff;
        }
        
        #content p {
            margin-bottom: 1rem;
            color: var(--text);
        }
        
        #content a {
            color: var(--link);
            text-decoration: none;
        }
        
        #content a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }
        
        #content ul, #content ol {
            margin: 1rem 0 1rem 1.5rem;
        }
        
        #content li {
            margin-bottom: 0.5rem;
        }
        
        #content code {
            background: var(--code-bg);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }
        
        #content pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--border);
        }
        
        #content pre code {
            background: none;
            padding: 0;
        }
        
        #content blockquote {
            border-left: 3px solid var(--link);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-dim);
            font-style: italic;
        }
        
        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        
        #content th, #content td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: left;
        }
        
        #content th {
            background: var(--code-bg);
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            nav {
                position: static;
                border-bottom: 1px solid var(--border);
                padding-bottom: 1rem;
            }
            
            main {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/">← Back to 0Latency</a>
    </header>
    
    <div class="container">
        <nav>
            <h3>Getting Started</h3>
            <ul>
                <li><a href="#" data-doc="README.md" class="active">Overview</a></li>
                <li><a href="#" data-doc="quick-start.md">Quick Start</a></li>
                <li><a href="#" data-doc="api-reference.md">API Reference</a></li>
            </ul>
            
            <h3>Examples</h3>
            <ul>
                <li><a href="#" data-doc="examples/chatbot.md">Simple Chatbot</a></li>
                <li><a href="#" data-doc="examples/claude-code.md">Claude Code Integration</a></li>
                <li><a href="#" data-doc="examples/customer-support.md">Customer Support</a></li>
            </ul>
        </nav>
        
        <main>
            <div id="content">Loading documentation...</div>
        </main>
    </div>
    
    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });
        
        async function loadDoc(docPath) {
            const content = document.getElementById('content');
            
            try {
                const response = await fetch(docPath);
                if (!response.ok) throw new Error('Failed to load');
                
                const markdown = await response.text();
                content.innerHTML = marked.parse(markdown);
                
                // Update active nav link
                document.querySelectorAll('nav a').forEach(a => {
                    a.classList.toggle('active', a.dataset.doc === docPath);
                });
                
                // Scroll to top
                window.scrollTo(0, 0);
                
                // Update URL hash
                window.location.hash = docPath;
                
            } catch (error) {
                content.innerHTML = `<h1>Error Loading Documentation</h1><p>Could not load ${docPath}</p>`;
            }
        }
        
        // Handle navigation clicks
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                loadDoc(e.target.dataset.doc);
            });
        });
        
        // Load from hash or default to README
        const initialDoc = window.location.hash.slice(1) || 'README.md';
        loadDoc(initialDoc);
        
        // Handle browser back/forward
        window.addEventListener('hashchange', () => {
            const doc = window.location.hash.slice(1) || 'README.md';
            loadDoc(doc);
        });
    </script>
</body>
</html>
